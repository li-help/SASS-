# GitHub Actions — SASS 知识平台 CI/CD
name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy:
        description: '部署到服务器'
        type: boolean
        default: false

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push sass-kb-server
        run: |
          cd sass-kb-server
          docker build -t ghcr.io/${{ github.repository_owner }}/sass-kb-server:latest .
          docker push ghcr.io/${{ github.repository_owner }}/sass-kb-server:latest

  build-auth:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push taoyue-auth
        run: |
          cd taoyue-edu-server
          docker build -f taoyue-auth/Dockerfile -t ghcr.io/${{ github.repository_owner }}/taoyue-auth:latest .
          docker push ghcr.io/${{ github.repository_owner }}/taoyue-auth:latest

  build-gateway:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push taoyue-gateway
        run: |
          cd taoyue-edu-server
          docker build -f taoyue-gateway/Dockerfile -t ghcr.io/${{ github.repository_owner }}/taoyue-gateway:latest .
          docker push ghcr.io/${{ github.repository_owner }}/taoyue-gateway:latest

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push sass-kb-admin
        run: |
          cd sass-kb-admin
          npm ci
          npm run build
          docker build -t ghcr.io/${{ github.repository_owner }}/sass-kb-admin:latest .
          docker push ghcr.io/${{ github.repository_owner }}/sass-kb-admin:latest

  deploy:
    needs: [build-backend, build-auth, build-gateway, build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/sass-kb
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            REPO=ghcr.io/${{ github.repository_owner }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans taoyue-auth gateway backend frontend
            docker image prune -f
