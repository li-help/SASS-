name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Build backend
        run: cd sass-kb-server && mvn clean package -DskipTests

  frontend-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sass-kb-admin/package-lock.json
      - name: Install dependencies
        run: cd sass-kb-admin && npm ci
      - name: Build admin
        run: cd sass-kb-admin && npm run build
