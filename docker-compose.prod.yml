# 生产环境 Docker Compose
# 用法：在 ECS 服务器 /opt/sass-kb/ 目录下执行
#   docker compose up -d
#   docker compose pull  # 拉取最新镜像

services:
  # ========== 基础设施 ==========
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sass_kb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # 仅本地访问
    volumes:
      - /opt/sass-kb/data/pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: elasticsearch:8.11.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - /opt/sass-kb/data/esdata:/usr/share/elasticsearch/data
    restart: always

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - /opt/sass-kb/data/miniodata:/data
    restart: always

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    restart: always
    command: redis-server --appendonly yes

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "127.0.0.1:5672:5672"
    volumes:
      - /opt/sass-kb/data/rabbitmq:/var/lib/rabbitmq
    restart: always

  # ========== 后端服务 ==========
  backend:
    image: ${CI_REGISTRY_IMAGE}/sass-kb-server:latest
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/sass_kb
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: sass-kb-files
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRE: 30
      JWT_REFRESH_TOKEN_EXPIRE: 10080
      APP_CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started
    restart: always

  # ========== 前端 (Nginx) ==========
  frontend:
    image: ${CI_REGISTRY_IMAGE}/sass-kb-admin:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always
