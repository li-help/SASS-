server:
  port: 8081

spring:
  application:
    name: taoyue-auth
  datasource:
    url: jdbc:postgresql://localhost:5432/sass_kb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  config:
    import: optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8849
      config:
        server-addr: 127.0.0.1:8849
        file-extension: yaml

jwt:
  secret: ${JWT_SECRET:sass-kb-default-secret-key-for-development}
  access-token-expire: 30
  refresh-token-expire: 10080

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: assign_id
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.zhentao: DEBUG
